name: Twice-weekly portal email-alert ingest

# Reads commodity/NIGP email alerts from the Outlook/M365 procurement alert
# inbox via the Microsoft Graph API and turns them into pipeline rows
# (state/local + cooperative funnel). No scraping: portals have no public
# feed/API, so the compliant channel is the email alert each portal sends to
# a registered supplier.
#
# Requires four repo secrets (one-time Azure app registration, see
# docs/email_ingest_setup.md): GRAPH_TENANT_ID, GRAPH_CLIENT_ID,
# GRAPH_CLIENT_SECRET, GRAPH_MAILBOX. Never commit these.

on:
  schedule:
    # Mondays + Thursdays 13:30 UTC = 08:30 Houston CDT (30 min after the SAM ingest).
    - cron: '30 13 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  ingest:
    name: Ingest alerts, score, open PR if active or Lead Radar changed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify Microsoft Graph secrets are present
        env:
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          GRAPH_MAILBOX: ${{ secrets.GRAPH_MAILBOX }}
        run: |
          missing=""
          [ -z "$GRAPH_TENANT_ID" ] && missing="$missing GRAPH_TENANT_ID"
          [ -z "$GRAPH_CLIENT_ID" ] && missing="$missing GRAPH_CLIENT_ID"
          [ -z "$GRAPH_CLIENT_SECRET" ] && missing="$missing GRAPH_CLIENT_SECRET"
          [ -z "$GRAPH_MAILBOX" ] && missing="$missing GRAPH_MAILBOX"
          if [ -n "$missing" ]; then
            echo "::error::Missing repo secret(s):$missing. Add them at Settings -> Secrets and variables -> Actions (see docs/email_ingest_setup.md), then re-run."
            exit 1
          fi
          echo "Microsoft Graph secrets present."

      - name: Run email-alert ingest (live Microsoft Graph API)
        env:
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          GRAPH_MAILBOX: ${{ secrets.GRAPH_MAILBOX }}
        run: |
          python tools/ingest_email.py --provider graph --graph-folder "Procurement Alerts" --since-days 8

      - name: Re-score active pipeline
        run: python tools/pipeline.py score

      - name: Run repository checks before PR creation
        run: |
          python -m compileall -q tools tests
          python -m unittest discover -s tests
          python tools/validate_vendor_profile.py vendor-profiles/continental_silverline.profile.json
          python tools/workflow_check.py
          python tools/dashboard.py --show summary

      - name: Detect whether active pipeline or Lead Radar changed
        id: diff
        run: |
          active_changed=false
          leads_changed=false
          git diff --quiet -- bids/active/_pipeline.csv || active_changed=true
          git diff --quiet -- leads/review/_lead_radar.csv || leads_changed=true

          changed=false
          if [ "$active_changed" = "true" ] || [ "$leads_changed" = "true" ]; then
            changed=true
          fi

          # Human-readable scope for the PR title/body.
          if [ "$active_changed" = "true" ] && [ "$leads_changed" = "true" ]; then
            scope="active bids + Lead Radar"
          elif [ "$active_changed" = "true" ]; then
            scope="active bids"
          elif [ "$leads_changed" = "true" ]; then
            scope="Lead Radar"
          else
            scope="none"
          fi

          {
            echo "active_changed=$active_changed"
            echo "leads_changed=$leads_changed"
            echo "changed=$changed"
            echo "scope=$scope"
          } >> "$GITHUB_OUTPUT"

          if [ "$changed" = "true" ]; then
            echo "Changes detected ($scope) - will open PR."
            git --no-pager diff --stat -- bids/active/_pipeline.csv leads/review/_lead_radar.csv
          else
            echo "No active-pipeline or Lead Radar changes - no PR will be opened."
          fi

      - name: Open PR with new rows
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_NUMBER: ${{ github.run_number }}
          EVENT_NAME: ${{ github.event_name }}
          SCOPE: ${{ steps.diff.outputs.scope }}
        run: |
          TODAY=$(date -u +%F)
          BRANCH="auto/email-ingest-${TODAY}-${RUN_NUMBER}"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          # Stage both relevance-routed CSVs; `git add` on an unchanged file is
          # a no-op, and the step only runs when at least one of them changed.
          git add bids/active/_pipeline.csv leads/review/_lead_radar.csv
          git commit -m "Twice-weekly portal email-alert ingest (${SCOPE}): ${TODAY}"
          git push -u origin "$BRANCH"

          cat > /tmp/pr_body.md <<'EOF'
          Automated twice-weekly portal email-alert ingest (state/local + cooperative funnel). **Human triage required before merge.**

          **This run updated: __SCOPE__.**

          Source: commodity/NIGP email alerts from the procurement alert inbox (Bonfire, IonWave, DemandStar, BidNet, BuyBoard, cooperatives, Texas ESBD). No scraping. Relevance-gated: `ACCEPT` -> active bids, `REVIEW` -> Lead Radar, `REJECT` dropped.

          ## Reviewer checklist

          1. **Active bids** (`bids/active/_pipeline.csv`): review each new row. Email parsing is best-effort: **verify title, due date, and link against the portal.**
          2. **Lead Radar** (`leads/review/_lead_radar.csv`): review each new `reviewing` row — these are broad/ambiguous upstream signals, NOT confirmed bids. Confirm `lead_type` and, only with a confirmed product fit, promote with:

             ```
             python tools/lead_radar.py promote <lead-id> \
               --confirmed-products "<e.g. mattresses; bed frames>"
             ```

          3. For active rows that are out-of-scope, past-due, or false-positive, archive with:

             ```
             python tools/pipeline.py move-to-archive <opportunity-id> \
               --status no-bid --next-action "No-bid archived" --note "<reason>"
             ```

             then amend this PR. For dead Lead Radar rows, use `python tools/lead_radar.py archive <lead-id> --status no-fit --note "<reason>"`.
          4. For active rows worth pursuing: refine `next_action`, assign an `owner`, and merge.
          5. If everything is out of scope, archive all new rows and close this PR without merging.

          ## CI note

          Commits authored by `GITHUB_TOKEN` do not trigger PR-event workflows.
          Push a follow-up commit or use "Re-run all checks" to run CI on this PR.

          ---

          Triggered by: `__EVENT_NAME__` (run #__RUN_NUMBER__).
          EOF

          sed -i "s|__SCOPE__|${SCOPE}|g" /tmp/pr_body.md
          sed -i "s|__EVENT_NAME__|${EVENT_NAME}|g" /tmp/pr_body.md
          sed -i "s|__RUN_NUMBER__|${RUN_NUMBER}|g" /tmp/pr_body.md

          gh pr create \
            --title "Twice-weekly portal email-alert ingest (${SCOPE}): ${TODAY}" \
            --body-file /tmp/pr_body.md \
            --base main \
            --head "$BRANCH"

      - name: Summary
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "Email ingest opened a PR for human triage (scope: ${{ steps.diff.outputs.scope }})."
          else
            echo "Email ingest ran clean - no new rows, no PR."
          fi
