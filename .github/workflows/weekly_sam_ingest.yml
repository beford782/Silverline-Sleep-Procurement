name: Twice-weekly SAM.gov mattress ingest

on:
  schedule:
    # Mondays + Thursdays 13:00 UTC = 08:00 Houston CDT / 07:00 CST.
    - cron: '0 13 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ingest:
    name: Ingest, score, open PR if active changed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify SAM_API_KEY secret is present
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
        run: |
          if [ -z "$SAM_API_KEY" ]; then
            echo "::error::SAM_API_KEY repo secret is not set. Add it at Settings -> Secrets and variables -> Actions, then re-run this workflow."
            exit 1
          fi
          echo "SAM_API_KEY present (${#SAM_API_KEY} chars)"

      - name: Compute posted-date window (today-7 .. today, UTC)
        id: window
        run: |
          POSTED_FROM=$(date -u +%F -d "7 days ago")
          POSTED_TO=$(date -u +%F)
          echo "posted_from=$POSTED_FROM" >> "$GITHUB_OUTPUT"
          echo "posted_to=$POSTED_TO" >> "$GITHUB_OUTPUT"
          echo "Window: $POSTED_FROM .. $POSTED_TO"

      - name: Run SAM.gov ingest sweeps (live API)
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
          POSTED_FROM: ${{ steps.window.outputs.posted_from }}
          POSTED_TO: ${{ steps.window.outputs.posted_to }}
        run: |
          # Broadened recall. A single title="mattress" sweep misses bedding/bed
          # buys whose titles never contain "mattress" (the Bernalillo-class
          # recall gap). Sweep by title AND by procurement classification:
          #   - NAICS 337910 = Mattress Manufacturing
          #   - PSC 7210 = Household Furnishings (bedding/linens/mattresses)
          #   - PSC 7105 = Household Furniture (beds/bunks/dormitory)
          # Each pass reads, dedups against, and rewrites the pipeline CSV, so
          # opportunities matched by more than one query are de-duplicated
          # automatically; relevance.py filters any off-target noise the broader
          # queries pull in. Passes share the posted-date window.
          run_sweep() {
            echo "::group::SAM sweep: $*"
            python tools/ingest_sam.py "$@" \
              --posted-from "$POSTED_FROM" \
              --posted-to "$POSTED_TO" \
              --allow-throttled-empty \
              --reject-log logs/rejects/_sam.csv
            echo "::endgroup::"
          }
          run_sweep --title "mattress"
          run_sweep --naics-code 337910
          run_sweep --psc 7210
          run_sweep --psc 7105
          run_sweep --title "bedding"
          run_sweep --title "box spring"
          run_sweep --title "bunk"

      - name: Detect whether SAM ingest changed active pipeline or Lead Radar
        id: ingest_diff
        run: |
          active_changed=false
          leads_changed=false
          git diff --quiet -- bids/active/_pipeline.csv || active_changed=true
          git diff --quiet -- leads/review/_lead_radar.csv || leads_changed=true

          changed=false
          if [ "$active_changed" = "true" ] || [ "$leads_changed" = "true" ]; then
            changed=true
          fi

          {
            echo "active_changed=$active_changed"
            echo "leads_changed=$leads_changed"
            echo "changed=$changed"
          } >> "$GITHUB_OUTPUT"

          if [ "$changed" = "true" ]; then
            echo "SAM ingest changed CSV(s) before scoring."
            git --no-pager diff --stat -- bids/active/_pipeline.csv leads/review/_lead_radar.csv
          else
            echo "SAM ingest added no active or Lead Radar rows."
          fi

      - name: Re-score active pipeline
        if: steps.ingest_diff.outputs.active_changed == 'true'
        env:
          POSTED_TO: ${{ steps.window.outputs.posted_to }}
        run: python tools/pipeline.py score --only-created-date "$POSTED_TO"

      - name: Run repository checks before PR creation
        if: steps.ingest_diff.outputs.changed == 'true'
        run: |
          python -m compileall -q tools tests
          python -m unittest discover -s tests
          python tools/validate_vendor_profile.py vendor-profiles/continental_silverline.profile.json
          python tools/generate_procurement_packet.py \
            vendor-profiles/continental_silverline_questionnaire.csv \
            --vendor "Continental Silverline" \
            --output-dir build/generated \
            --generated-date 2026-05-13
          python tools/draft_bid_response.py city-of-austin-ifb-8300-dcg1033 \
            --vendor vendor-profiles/continental_silverline.profile.json \
            --generated-date 2026-05-14 \
            --force
          python tools/workflow_check.py
          python tools/dashboard.py --show summary
          python tools/portal_csv_mapping.py tests/fixtures/esbd_export_sample.csv \
            --source "Texas ESBD"

      - name: Detect whether active pipeline or Lead Radar changed
        id: diff
        run: |
          active_changed=false
          leads_changed=false
          git diff --quiet -- bids/active/_pipeline.csv || active_changed=true
          git diff --quiet -- leads/review/_lead_radar.csv || leads_changed=true

          changed=false
          if [ "$active_changed" = "true" ] || [ "$leads_changed" = "true" ]; then
            changed=true
          fi

          if [ "$active_changed" = "true" ] && [ "$leads_changed" = "true" ]; then
            scope="active bids + Lead Radar"
          elif [ "$active_changed" = "true" ]; then
            scope="active bids"
          elif [ "$leads_changed" = "true" ]; then
            scope="Lead Radar"
          else
            scope="none"
          fi

          {
            echo "active_changed=$active_changed"
            echo "leads_changed=$leads_changed"
            echo "changed=$changed"
            echo "scope=$scope"
          } >> "$GITHUB_OUTPUT"

          if [ "$changed" = "true" ]; then
            echo "Changes detected ($scope) - will open PR."
            git --no-pager diff --stat -- bids/active/_pipeline.csv leads/review/_lead_radar.csv
          else
            echo "No active-pipeline or Lead Radar changes - no PR will be opened."
          fi

      - name: Open PR with new rows
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSTED_FROM: ${{ steps.window.outputs.posted_from }}
          POSTED_TO: ${{ steps.window.outputs.posted_to }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_NUMBER: ${{ github.run_number }}
          SCOPE: ${{ steps.diff.outputs.scope }}
        run: |
          BRANCH="auto/sam-ingest-${POSTED_TO}-${RUN_NUMBER}"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add bids/active/_pipeline.csv leads/review/_lead_radar.csv logs/rejects/
          git commit -m "Twice-weekly SAM.gov ingest (${SCOPE}): posted ${POSTED_FROM}..${POSTED_TO}"
          git push -u origin "$BRANCH"

          cat > /tmp/pr_body.md <<'EOF'
          Automated twice-weekly SAM.gov mattress ingest. **Human triage required before merge.**

          **This run updated: __SCOPE__.** Posted-date window: `__POSTED_FROM__` to `__POSTED_TO__` (inclusive, today minus 7 days, UTC).

          Relevance-gated: `ACCEPT` -> active bids, `REVIEW` -> Lead Radar (`leads/review/_lead_radar.csv`), `REJECT` dropped.

          ## Reviewer checklist

          1. **Active bids** (`bids/active/_pipeline.csv`): review each new row.
          2. **Lead Radar** (`leads/review/_lead_radar.csv`): review each new broad/ambiguous federal signal — NOT a confirmed bid. Only with a confirmed product fit, promote with `python tools/lead_radar.py promote <lead-id> --confirmed-products "<...>"`.
          3. For active rows that are out-of-scope, past-due, or false-positive, archive with:

             ```
             python tools/pipeline.py move-to-archive <opportunity-id> \
               --status no-bid --next-action "No-bid archived" --note "<reason>"
             ```

             then amend this PR. For dead Lead Radar rows, use `python tools/lead_radar.py archive <lead-id> --status no-fit --note "<reason>"`.
          4. For rows worth pursuing: refine `next_action`, assign an `owner`, and merge.
          5. If everything is out of scope, archive all new rows and close this PR without merging.

          ## CI note

          Commits authored by `GITHUB_TOKEN` do not trigger PR-event workflows.
          The repo CI will not auto-run on this PR's initial commit. Either push
          a follow-up commit (which will trigger CI) or use the "Re-run all
          checks" button on this PR.

          ---

          Triggered by: `__EVENT_NAME__` (run #__RUN_NUMBER__).
          EOF

          sed -i "s|__SCOPE__|${SCOPE}|g" /tmp/pr_body.md
          sed -i "s|__POSTED_FROM__|${POSTED_FROM}|g" /tmp/pr_body.md
          sed -i "s|__POSTED_TO__|${POSTED_TO}|g" /tmp/pr_body.md
          sed -i "s|__EVENT_NAME__|${EVENT_NAME}|g" /tmp/pr_body.md
          sed -i "s|__RUN_NUMBER__|${RUN_NUMBER}|g" /tmp/pr_body.md

          gh pr create \
            --title "Twice-weekly SAM.gov ingest: posted ${POSTED_FROM}..${POSTED_TO}" \
            --body-file /tmp/pr_body.md \
            --base main \
            --head "$BRANCH"

      - name: Summary
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "Weekly ingest opened a PR for human triage."
          else
            echo "Weekly ingest ran clean - no new rows, no PR."
          fi

      # A failed scheduled sweep is the silent-miss failure mode: the run goes
      # red but nobody is watching the Actions tab. Surface it as a GitHub issue
      # so a missed federal window is visible. Create-or-comment de-dupes.
      - name: Alert on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW: ${{ github.workflow }}
        run: |
          TITLE="Ingest failure: ${WORKFLOW}"
          TODAY=$(date -u +%F)
          {
            echo "The scheduled ingest workflow **${WORKFLOW}** FAILED on ${TODAY}."
            echo
            echo "- Failed run: ${RUN_URL}"
            echo "- Impact: a federal/portal sweep did not complete, so new mattress/bedding opportunities in this window may have been missed."
            echo
            echo "## What to do"
            echo "1. Open the failed run above and read the first red step."
            echo "2. Common causes: missing/expired \`SAM_API_KEY\` secret, SAM.gov throttling/outage, or a code error."
            echo "3. Fix the cause, then use \"Re-run all jobs\" on that run."
          } > /tmp/fail.md
          ISSUE_NUMBER=$(gh issue list --state open --search "\"${TITLE}\" in:title" --json number,title \
            --jq ".[] | select(.title == \"${TITLE}\") | .number" | head -n 1)
          if [ -z "$ISSUE_NUMBER" ]; then
            gh issue create --title "$TITLE" --body-file /tmp/fail.md
          else
            gh issue comment "$ISSUE_NUMBER" --body-file /tmp/fail.md
          fi
